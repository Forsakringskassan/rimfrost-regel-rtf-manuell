quarkus.index-dependency.rimfrost-adapter-arbetsgivare.group-id=se.fk.rimfrost.adapter.arbetsgivare
quarkus.index-dependency.rimfrost-adapter-arbetsgivare.artifact-id=rimfrost-adapter-arbetsgivare
quarkus.index-dependency.rimfrost-adapter-folkbokford.group-id=se.fk.rimfrost.adapter.folkbokford
quarkus.index-dependency.rimfrost-adapter-folkbokford.artifact-id=rimfrost-adapter-folkbokford
quarkus.index-dependency.rimfrost-framework-regel-manuell.group-id=se.fk.rimfrost.framework.regel.manuell
quarkus.index-dependency.rimfrost-framework-regel-manuell.artifact-id=rimfrost-framework-regel-manuell
quarkus.index-dependency.rimfrost-referensdata-erbjudande.group-id=se.fk.rimfrost.referensdata
quarkus.index-dependency.rimfrost-referensdata-erbjudande.artifact-id=rimfrost-referensdata-erbjudande

# Container image configuration
quarkus.container-image.name=rimfrost-regel-rtf-manuell

# Kafka setup
kafka.source=RegelRtfManuell
kafka.subtopic=rtf-manuell
quarkus.kafka.devservices.topics=rtf-manuell-requests,rtf-manuell-responses,operativt-uppgiftslager-status-notification

#Incoming
mp.messaging.incoming.regel-requests.topic=rtf-manuell-requests
mp.messaging.incoming.operativt-uppgiftslager-status-notification.topic=operativt-uppgiftslager-status-notification.rtf-manuell

#Outgoing
mp.messaging.outgoing.regel-responses.topic=rtf-manuell-responses

# Persistence
quarkus.flyway.default-schema=regel_rtf_manuell
regel.persistence.table-prefix=rtf_manuell

%prod.quarkus.datasource.username=${DB_USERNAME}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.jdbc.url=${DB_URL}

# REST setup
arbetsgivare.api.base-url=http://rimfrost-k8s-arbetsgivare:8080
folkbokford.api.base-url=http://rimfrost-k8s-folkbokford:8080
oul.api.base-url=http://rimfrost-k8s-uppgiftslager:8080
